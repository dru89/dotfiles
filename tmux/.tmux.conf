# ─── Terminal ─────────────────────────────────────────────────
# Ghostty supports true color natively. tmux-256color is the
# modern default; the override enables 24-bit color passthrough.
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-ghostty:RGB"
set -s extended-keys on
set -as terminal-features ",xterm-ghostty:extkeys"

# ─── General ──────────────────────────────────────────────────
set -g history-limit 50000        # generous scrollback
set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes too
set -g renumber-windows on        # close a window, renumber the rest
set -g set-clipboard on           # use OSC 52 for clipboard (Ghostty supports this)
set -s escape-time 0              # no delay after Escape (critical for vim/nvim)
set -g focus-events on            # let editors know about focus changes
set -g mouse on                   # click panes, resize by dragging, scroll

# Don't let programs rename windows, but allow manual renames
set -g allow-rename off
setw -g automatic-rename off

# Activity monitoring — highlight the tab, don't pop a message
setw -g monitor-activity on
set -g visual-activity off

# ─── Prefix ──────────────────────────────────────────────────
# Ctrl-f as prefix — easy to reach, and its default terminal
# behavior (forward one char) is redundant with the arrow key.
set -g prefix C-f
unbind C-b
bind C-f send-prefix

# ─── Reload ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ─── Splits & Windows ────────────────────────────────────────
# v and s for splits (vim-style), inheriting the current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Also fix the defaults to preserve path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Navigation ──────────────────────────────────────────────
# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+h/l to cycle windows (no prefix needed)
bind -n M-h previous-window
bind -n M-l next-window

# Alt+arrows to resize panes (no prefix needed)
bind -n M-Left  resize-pane -L 2
bind -n M-Right resize-pane -R 2
bind -n M-Down  resize-pane -D 2
bind -n M-Up    resize-pane -U 2

# ─── Copy Mode ───────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Session Management ─────────────────────────────────────
# Confirm before killing
bind K confirm-before -p "Kill server? (y/n)" kill-server
bind X confirm-before -p "Kill session? (y/n)" kill-session

# ─── Status Bar ──────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre

# Minimal, clean look — transparent background
set -g status-style "bg=default fg=white"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=cyan,bold]#S"

# Right: hostname and time
set -g status-right-length 50
set -g status-right "#[fg=white,dim]#h  #[fg=white]%b %d %I:%M%p"

# Window tabs
set -g window-status-format " #I:#W "
set -g window-status-style "fg=colour245"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=yellow,bold"
set -g window-status-activity-style "fg=cyan"

# ─── Pane Borders ────────────────────────────────────────────
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=cyan"
